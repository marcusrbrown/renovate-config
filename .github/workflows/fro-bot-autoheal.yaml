---
name: Fro Bot Autoheal

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      prompt:
        description: Custom autoheal prompt (leave empty for default)
        type: string
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: fro-bot-autoheal
  cancel-in-progress: false

env:
  AUTOHEAL_PROMPT: |
    Perform daily repository autohealing for marcusrbrown/renovate-config —
    a collection of shareable Renovate configuration presets consumed by
    repositories in the @marcusrbrown, @bfra-me, and @fro-bot organizations.
    Read AGENTS.md for full project conventions before making changes.

    EXECUTION MODEL
    Analyze all categories independently, but perform write actions serially.
    Do not keep multiple branches checked out at once. Complete one mutation,
    return to a clean working tree, then continue.

    DEDUPLICATION (applies to ALL categories)
    Before creating any new PR or issue, search for an existing open
    bot-authored PR/issue for the same root cause. Reuse or update the
    existing item instead of creating a duplicate.

    SCOPE CAP
    If the smallest safe fix is not clearly minimal and reversible (e.g.,
    broad refactor, architecture change, or many-file edit), do not
    auto-heal it. Open or update an issue and log it under "Needs Human
    Attention".

    DEPENDENCY OWNERSHIP
    Renovate owns routine dependency/version bumps via the self-referential
    config in .github/renovate.json5 with postUpgradeTasks running
    `pnpm run bootstrap` and `pnpm run fix`. You may change dependency
    versions only when remediating a confirmed security advisory
    (critical/high) or repairing an existing security-update PR. Do not
    create non-security version-bump PRs, and do not batch unrelated
    dependency changes into a security fix. Do NOT modify package.json
    versions outside category 2 security remediation.

    1. ERRORED PRs
       Find open PRs with failing CI checks. Skip dependency/security
       update PRs here; handle them only in category 2.
       Only fix PRs whose head branch is in this repository, writable by
       this token, and authored by a trusted source (repository
       owner/collaborator with write access, or an approved automation bot
       such as Renovate/Dependabot). If author trust cannot be established,
       skip the PR and log it under "Needs Human Attention".
       If the PR touches workflows, automation prompts, lockfiles, or
       execution scripts, do not run project commands from that branch.
       Skip it and log why.
       For each fixable PR:
       a. Check out the PR branch.
       b. Read the failing check logs to diagnose the root cause.
       c. Fix the issue (lint failures, JSON validation errors, formatting
          breaks, invalid Renovate config syntax).
       d. Commit with a clear message and push to the PR branch.
       e. Comment on the PR explaining what failed and what was fixed.

    2. SECURITY
       Review Dependabot/Renovate alerts and open PRs for vulnerable deps.
       - If a security update PR exists but has conflicts or failures,
         fix and push to that PR branch.
       - For unaddressed critical/high advisories with no existing PR,
         create a new PR with the remediation.
       - Do NOT bulk-update unrelated deps in a security PR.
       If security advisory/alert data is unavailable to the token or CLI,
       skip this category and note "security alerts unavailable" under
       "Needs Human Attention". Do not guess.

    3. CONFIG VALIDATION & PRESET QUALITY
       Validate all Renovate preset files (default.json, onboarding.json,
       archived-repository.json) and the self-referential config
       (.github/renovate.json5):
       - Verify each file is valid JSON/JSON5 and conforms to
         https://docs.renovatebot.com/renovate-schema.json.
       - Check for deprecated Renovate configuration options by consulting
         the Renovate docs. If deprecated options are found, open or update
         a single issue listing deprecated options, their replacements, and
         which files are affected.
       - Verify the base preset pin (github>bfra-me/renovate-config#...)
         in default.json references a valid, released version. If a newer
         compatible version exists, note it in the report but do NOT update
         the pin (Renovate handles version bumps).
       - Check that matchPackageNames patterns and matchSourceUrlPrefixes
         use valid syntax and refer to existing package scopes/orgs.
       - Verify packageRules do not conflict (e.g., overlapping matchers
         with contradictory automerge/enabled settings).
       - Run `pnpm run lint` to catch ESLint/Prettier violations.
       Report findings but do not auto-fix config logic issues. Only
       auto-fix formatting/lint failures in category 4.

    4. DEVELOPER EXPERIENCE
       Ensure consistent linting, formatting, and static analysis.
       Run `pnpm run lint` to detect issues. Auto-fix with `pnpm run fix`.
       Open a PR for all fixes — never commit directly to the default
       branch. Group related lint/format fixes into a single PR.
       Verify the fix PR passes CI before reporting it as fixed.

    5. BFRA-ME ECOSYSTEM HEALTH
       Assess the health of Renovate configuration across the ecosystem.
       This category is report-only — do NOT push code changes.
       - Check the GitHub Actions workflow files in this repository for
         unpinned actions or outdated pinned SHAs. Compare against the
         digests used in main.yaml as the reference standard.
       - Verify that reusable workflows from bfra-me/.github (used in
         renovate.yaml and update-repo-settings.yaml) reference current
         versions.
       - Check whether the helpers:pinGitHubActionDigestsToSemver preset
         in default.json is still current and supported.
       - Scan for stale TODO/FIXME/HACK annotations in any file using
         git blame; if any are older than 90 days, collect them into a
         single issue or update an existing "Stale TODOs" issue.
       - Review the OpenSSF Scorecard workflow (scorecard.yaml) and
         CodeQL analysis workflow (codeql-analysis.yaml) for configuration
         drift or outdated action versions.
       Report all findings in the summary issue. Open separate issues only
       for actionable items that require human decision-making.

    Hard boundaries:
    - Never force-push, rewrite history, or delete branches.
    - Never push directly to the default branch. Direct pushes are allowed
      only to an existing non-default PR branch you are repairing under
      category 1 or category 2.
    - Never merge PRs, submit reviews/approvals, close/reopen PRs or
      issues, or modify branch protection. This workflow may only push
      fixes, open/update PRs, open/update issues, and comment on PRs when
      a fix was pushed.
    - Never modify secrets, org settings, environments, or branch
      protection.
    - Never make checks pass by disabling tests, deleting failing
      assertions, weakening lint rules, or editing workflows/configuration
      only to suppress failures.
    - Do not modify .github/workflows/, lint/build config, or automation
      prompt files unless the failing run is caused by a genuine bug in
      that file, the change is narrowly scoped, and the summary explains
      why.
    - If the smallest safe fix would weaken a guardrail or reduce
      validation, skip it and log it under "Needs Human Attention".
    - Do not create multiple summary issues.

    Project conventions (MUST follow for code changes):
    - JSON presets: 2-space indent, include $schema, include description
    - JSON5 for local configs (.github/renovate.json5), JSON for presets
    - GitHub Actions: pin to full commit SHA with semver comment
    - Package manager: pnpm (not npm/yarn)
    - YAML extension: .yaml, not .yml
    - Commit messages: conventional commit format (feat/fix/build/chore)

    OUTPUT FORMAT — SINGLE SUMMARY ISSUE
    After completing all work, find an existing open issue titled
    "Daily Autohealing Report — YYYY-MM-DD" (using today's UTC date).
    If it exists, update its body. If not, create it.

    The issue body MUST use this structure. If a section has no rows, do
    not emit an empty table — write "None." directly under that heading.

    ## Daily Autohealing Report — YYYY-MM-DD (UTC)

    ### Errored PRs
    | PR | Failure | Fix | Status |
    | --- | --- | --- | --- |
    | #N | [root cause] | [what was fixed] | ✅ Fixed / ⚠️ Needs review |

    ### Security
    | Advisory / PR | Severity | Action Taken |
    | --- | --- | --- |
    | [advisory or #N] | Critical/High/Medium | [fix pushed / PR created / skipped] |

    ### Config Validation & Preset Quality
    | File | Check | Result | Action |
    | --- | --- | --- | --- |
    | default.json | Schema valid | ✅ / ❌ | [details or #N] |
    | default.json | Deprecated options | ✅ None / ⚠️ Found | [details or #N] |
    | default.json | Base preset current | ✅ / ⚠️ Newer available | [version info] |
    | default.json | Rule conflicts | ✅ None / ⚠️ Found | [details] |
    | onboarding.json | Schema valid | ✅ / ❌ | [details or #N] |
    | archived-repository.json | Schema valid | ✅ / ❌ | [details or #N] |
    | .github/renovate.json5 | Schema valid | ✅ / ❌ | [details or #N] |
    | All presets | Lint/format | ✅ Clean / ⚠️ Issues | [#N or details] |

    ### Developer Experience
    - [list of each PR or fix with summary link, or "None."]

    ### bfra-me Ecosystem Health
    | Check | Result | Action |
    | --- | --- | --- |
    | Unpinned/outdated actions | ✅ All current / ⚠️ Found N | [details or #N] |
    | Reusable workflow versions | ✅ Current / ⚠️ Outdated | [details] |
    | Scorecard workflow | ✅ Current / ⚠️ Drift | [details] |
    | CodeQL workflow | ✅ Current / ⚠️ Drift | [details] |
    | Stale TODOs | N found / None | [#N or None] |

    ### Needs Human Attention
    - [items that could not be auto-fixed, with context]

    Do NOT create multiple issues. Do NOT comment on individual issues.
    Produce exactly one summary issue per run.

jobs:
  resolve-prompt:
    name: Resolve Autoheal Prompt
    runs-on: ubuntu-latest
    outputs:
      prompt: ${{ steps.resolve.outputs.prompt }}
    steps:
      - id: resolve
        env:
          INPUT_PROMPT: ${{ github.event.inputs.prompt || '' }}
          DEFAULT_PROMPT: ${{ env.AUTOHEAL_PROMPT }}
        run: |
          delimiter="EOF_$(openssl rand -hex 8)"
          if [ -n "$INPUT_PROMPT" ]; then
            {
              echo "prompt<<$delimiter"
              echo "$INPUT_PROMPT"
              echo "$delimiter"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "prompt<<$delimiter"
              echo "$DEFAULT_PROMPT"
              echo "$delimiter"
            } >> "$GITHUB_OUTPUT"
          fi

  fro-bot-autoheal:
    name: Fro Bot Autoheal
    needs: resolve-prompt
    uses: ./.github/workflows/fro-bot.yaml
    secrets: inherit
    with:
      prompt: ${{ needs.resolve-prompt.outputs.prompt }}
